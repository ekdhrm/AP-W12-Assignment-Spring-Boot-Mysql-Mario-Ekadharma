<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi - IMT '25</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body flex class="d-flex flex-column min-vh-100">
    <div class="container-fluid mt-4">
        <h1 class="mb-4">Presensi - IMT '25</h1>
        
        <div class="row">
            <!-- Present Table (Left) -->
            <div class="col-md-6 pe-2">
                <h2 class="mb-3">
                    <i class="bi bi-check-circle-fill text-success"></i> Present
                </h2>
                <table class="table table-striped table-success">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>NIM</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="presensi : ${presentList}">
                            <td th:text="${presensi.name}">Name</td>
                            <td th:text="${presensi.nim}">NIM</td>
                            <td><span class="badge bg-success" th:text="${presensi.status}">Status</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(presentList)}">
                            <td colspan="3" class="text-center text-muted">No present records</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Absent Table (Right) -->
            <div class="col-md-6 ps-2">
                <h2 class="mb-3">
                    <i class="bi bi-x-circle-fill text-danger"></i> Absent
                </h2>
                <table class="table table-striped table-danger">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>NIM</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="presensi : ${absentList}">
                            <td th:text="${presensi.name}">Name</td>
                            <td th:text="${presensi.nim}">NIM</td>
                            <td><span class="badge bg-danger" th:text="${presensi.status}">Status</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(absentList)}">
                            <td colspan="3" class="text-center text-muted">No absent records</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
